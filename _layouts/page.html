---
layout: default
---

<div class="container">
  <div class="legal-page">
    <h1 class="legal-page__title">{{ page.title }}</h1>
    {% if page.last_updated %}
    <p class="legal-page__updated">Last updated: {{ page.last_updated }}</p>
    {% endif %}
    <div class="legal-page__body">
      {{ content }}
    </div>
  </div>
</div>
